name: Collect Funding Snapshots

on:
  schedule:
    # GitHub Actions mínimo: 5 minutos (mesmo com '* * * * *' não corre a cada 1 min)
    # 288 snapshots/dia são suficientes para validação estatística de 7 dias
    - cron: '*/5 * * * *'

  # Execução manual para testar / forçar colecta
  workflow_dispatch:

# Impede execuções simultâneas (se o job anterior ainda estiver a correr)
concurrency:
  group: snapshot-collection
  cancel-in-progress: false

jobs:
  collect:
    name: Collect & Persist Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 4  # falha se demorar mais de 4 minutos (segurança)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Collect snapshots
        run: node scripts/github-actions/collect-snapshot.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Snapshot collection failed at $(date -u)"
          echo "Verifica os logs acima para detalhes do erro."
