name: Flash Loan Scanner — Base Chain

on:
  schedule:
    # A cada 2 minutos — flash loan opportunities são efémeras
    # GitHub Actions mínimo real: ~5 minutos
    - cron: '*/2 * * * *'

  # Execução manual para testar
  workflow_dispatch:

# Impede execuções simultâneas
concurrency:
  group: flash-loan-scan
  cancel-in-progress: false

jobs:
  scan:
    name: Scan Flash Loan Opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @supabase/supabase-js --no-save --no-package-lock --ignore-scripts --legacy-peer-deps

      - name: Scan Flash Loan Opportunities
        run: node scripts/github-actions/flash-loan-scan.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Flash loan scan failed at $(date -u)"
          echo "Verifica os logs acima para detalhes do erro."
